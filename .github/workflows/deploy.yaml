name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app via Docker
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3172
          username: anzorcode
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          script: |
            set -e

            IMAGE_NAME="ghcr.io/anzorcode05/catty-reminders-app:${{ github.sha }}"
            CONTAINER_NAME="catty-app"

            echo "=== Docker deployment started ==="

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u anzorcode05 --password-stdin

            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker pull $IMAGE_NAME

            docker run -d \
              --name $CONTAINER_NAME \
              --restart always \
              -p 8181:8181 \
              $IMAGE_NAME

            sleep 3
            if docker ps --filter "name=$CONTAINER_NAME" -q | grep -q .; then
              echo "Container started successfully"
            else
              echo "Error: container failed to start"
              docker logs $CONTAINER_NAME || true
              exit 1
            fi

            echo "=== Deployment completed successfully ==="
