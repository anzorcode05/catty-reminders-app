name: CD

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3172
          username: anzorcode
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          script: |
            set -e
            cd /home/anzorcode/catty-reminders-app
            echo "=== Docker Compose deployment started ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export DEPLOY_REF=${{ github.sha }}
            export DB_ROOT_PASSWORD=rootpass
            export DB_DATABASE=catty_reminders
            export DB_USER=catty_user
            export DB_PASSWORD=catty_pass
            docker compose down --remove-orphans
            docker system prune -f
            docker compose pull
            docker compose up -d --force-recreate
            sleep 5
            if docker compose ps | grep -q "Up"; then
              echo "Stack started successfully"
              echo "=== Current DEPLOY_REF ==="
              docker exec catty-app printenv | grep DEPLOY_REF || echo "DEPLOY_REF not set"
            else
              echo "Error: stack failed to start"
              docker compose logs
              exit 1
            fi
            echo "=== Deployment completed successfully ==="
